name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # @electron/notarize@3.x requires Node >= 22.12.0 (engines field)
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile
      # electron-builder auto-publishes on tag in CI (needs GH_TOKEN); CI uses
      # dist:mac:all:ci (--publish never) and uploads via action-gh-release instead.
      - run: yarn dist:mac:all:ci

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
