name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # @electron/notarize@3.x requires Node >= 22.12.0 (engines field)
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile
      # Signed universal matrix (arm64 + x64), --publish never; upload artifacts below.
      # Add matching repository secrets for anything you rely on locally.
      - run: yarn dist:mac:signed:all
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
